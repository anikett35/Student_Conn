<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

            display: flex;
            justify-content: center;
            align-items: center;
        }



        .form-container {
            display: flex;
            height: 500px;
        }

        .form-section {
            flex: 1;
            padding: 40px;
            display: none;
            flex-direction: column;
            justify-content: center;
        }

        .form-section.active {
            display: flex;
        }

        .form-section h2 {
            font-size: 28px;
            margin-bottom: 30px;
            color: #333;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .toggle-text {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }

        .toggle-text a {
            color: #667eea;
            cursor: pointer;
            text-decoration: none;
            font-weight: 600;
        }

        .toggle-text a:hover {
            text-decoration: underline;
        }

        .side-panel {
            flex: 1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .side-panel h3 {
            font-size: 24px;
            margin-bottom: 20px;
        }

        .side-panel p {
            margin-bottom: 30px;
            opacity: 0.9;
        }

        .error {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 5px;
            display: none;
        }

        .success {
            color: #27ae60;
            font-size: 14px;
            margin-top: 5px;
            display: none;
        }

        @media (max-width: 768px) {
            .form-container {
                flex-direction: column;
                height: auto;
            }

            .side-panel {
                display: none;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="form-container">

            <div class="form-section active" id="login-section">
                <h2>Login</h2>
                <form id="login-form" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label for="login-email">Email</label>
                        <input type="email" id="login-email" required placeholder="Enter your email">
                    </div>
                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" required placeholder="Enter your password">
                        <div class="error" id="login-error"></div>
                        <div class="success" id="login-success"></div>
                    </div>
                    <button type="submit" class="btn">Login</button>
                </form>
                <div class="toggle-text">
                    Don't have an account? <a onclick="toggleForms()">Register here</a>
                </div>
            </div>


            <div class="form-section" id="register-section">
                <h2>Register</h2>
                <form id="register-form" onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label for="register-name">Full Name</label>
                        <input type="text" id="register-name" required placeholder="Enter your full name">
                    </div>
                    <div class="form-group">
                        <label for="register-email">Email</label>
                        <input type="email" id="register-email" required placeholder="Enter your email">
                    </div>
                    <div class="form-group">
                        <label for="register-password">Password</label>
                        <input type="password" id="register-password" required placeholder="Enter your password">
                    </div>
                    <div class="form-group">
                        <label for="register-confirm">Confirm Password</label>
                        <input type="password" id="register-confirm" required placeholder="Confirm your password">
                        <div class="error" id="register-error"></div>
                        <div class="success" id="register-success"></div>
                    </div>
                    <button type="submit" class="btn">Register</button>
                </form>
                <div class="toggle-text">
                    Already have an account? <a onclick="toggleForms()">Login here</a>
                </div>
            </div>


            <div class="side-panel">
                <h3>Welcome to Student Connect</h3>
                <p>Connect with students, share knowledge, and grow together</p>
            </div>
        </div>
    </div>

    <script>
        function toggleForms() {
            const loginSection = document.getElementById('login-section');
            const registerSection = document.getElementById('register-section');
            loginSection.classList.toggle('active');
            registerSection.classList.toggle('active');
        }

        function handleLogin(event) {
            event.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const errorDiv = document.getElementById('login-error');
            const successDiv = document.getElementById('login-success');

            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';

            const users = JSON.parse(localStorage.getItem('users')) || [];
            const user = users.find(u => u.email === email && u.password === password);

            if (user) {
                successDiv.textContent = 'Login successful! Redirecting...';
                successDiv.style.display = 'block';
                localStorage.setItem('currentUser', JSON.stringify(user));
                setTimeout(() => {
                    window.location.href = 'home.html';
                }, 1500);
            } else {
                errorDiv.textContent = 'Invalid email or password';
                errorDiv.style.display = 'block';
            }
        }

        function handleRegister(event) {
            event.preventDefault();
            const name = document.getElementById('register-name').value;
            const email = document.getElementById('register-email').value;
            const password = document.getElementById('register-password').value;
            const confirm = document.getElementById('register-confirm').value;
            const errorDiv = document.getElementById('register-error');
            const successDiv = document.getElementById('register-success');

            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';

            if (password !== confirm) {
                errorDiv.textContent = 'Passwords do not match';
                errorDiv.style.display = 'block';
                return;
            }

            if (password.length < 6) {
                errorDiv.textContent = 'Password must be at least 6 characters';
                errorDiv.style.display = 'block';
                return;
            }


            const users = JSON.parse(localStorage.getItem('users')) || [];

            if (users.find(u => u.email === email)) {
                errorDiv.textContent = 'Email already registered';
                errorDiv.style.display = 'block';
                return;
            }


            users.push({ name, email, password });
            localStorage.setItem('users', JSON.stringify(users));

            successDiv.textContent = 'Registration successful! Login now.';
            successDiv.style.display = 'block';

            setTimeout(() => {
                document.getElementById('register-form').reset();
                toggleForms();
            }, 1500);
        }
    </script>
</body>

</html>
